app:
  env: development
  port: 8080
  jwt_secret: "super-secret-jwt-key-change-in-prod"
  jwt_expiry_hours: 24

# PostgreSQL shards — each shard has a primary (write) + replicas (read)
postgres:
  shards:
    - id: 0
      primary: "postgres://appuser:secret@pg-primary:5432/orders_shard0?sslmode=disable"
      replicas:
        - "postgres://appuser:secret@pg-primary:5432/orders_shard0?sslmode=disable"
    - id: 1
      primary: "postgres://appuser:secret@pg-replica1:5432/orders_shard1?sslmode=disable"
      replicas:
        - "postgres://appuser:secret@pg-replica1:5432/orders_shard1?sslmode=disable"
    - id: 2
      primary: "postgres://appuser:secret@pg-replica2:5432/orders_shard2?sslmode=disable"
      replicas:
        - "postgres://appuser:secret@pg-replica2:5432/orders_shard2?sslmode=disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime_minutes: 5

# MongoDB replica set for product catalog
mongodb:
  uri: "mongodb://mongouser:secret@mongo-primary:27017,mongo-secondary1:27017,mongo-secondary2:27017/?replicaSet=rs0&authSource=admin"
  database: "catalog"
  read_preference: "secondaryPreferred"

# Redis — two modes selectable via cluster.enabled
# Mode A: standalone (master/replica/sentinel) — dev default
# Mode B: cluster (3 masters × 1 replica, sharded) — production
redis:
  # ── Standalone mode (cluster.enabled = false) ──────────────────
  master:
    addr: "redis-master:6379"
    password: "secret"
    db: 0
  replicas:
    - addr: "redis-replica1:6379"
      password: "secret"
      db: 0
    - addr: "redis-replica2:6379"
      password: "secret"
      db: 0
  sentinel:
    master_name: "mymaster"
    addrs:
      - "redis-sentinel1:26379"
    password: "secret"

  # ── Cluster mode (cluster.enabled = true) ──────────────────────
  # 3 masters × 1 replica = 6 nodes, 16384 hash slots
  # Each master owns ~5461 slots; replicas mirror their master.
  # Sharding: CRC16(key) % 16384 → slot → master node
  # Replication: async, automatic failover (no Sentinel needed)
  cluster:
    enabled: false          # set true to use cluster mode
    addrs:
      - "redis-cluster-1:7001"
      - "redis-cluster-2:7002"
      - "redis-cluster-3:7003"
      - "redis-cluster-4:7004"
      - "redis-cluster-5:7005"
      - "redis-cluster-6:7006"
    password: "secret"
    read_from_replica: true  # route reads to replicas (eventual consistency)
    max_redirects: 8         # follow MOVED/ASK redirects during resharding

  ttl:
    product_seconds: 300
    user_session_seconds: 3600
    cart_seconds: 1800
    rate_limit_seconds: 60
  rate_limit:
    requests_per_minute: 100

# Kafka — 3-broker cluster for replication + partitioning
# Partitioning = sharding for Kafka (each partition is an independent ordered log)
# Replication  = each partition has RF-1 follower replicas on different brokers
kafka:
  brokers:
    - "kafka-1:9092"
    - "kafka-2:9092"
    - "kafka-3:9092"
  replication_factor: 3   # RF=3: tolerates 2 broker failures
  auto_create_topics: true # set false in production
