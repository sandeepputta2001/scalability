version: "3.9"

# ─── Shared Kafka environment ──────────────────────────────────────────────────
# KRaft mode (no ZooKeeper). Each broker is both a controller and a broker.
# CLUSTER_ID must be the same across all brokers — generated once with:
#   docker run --rm confluentinc/cp-kafka:7.6.0 kafka-storage random-uuid
x-kafka-common: &kafka-common
  image: confluentinc/cp-kafka:7.6.0
  environment:
    KAFKA_KRAFT_MODE: "true"
    CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    KAFKA_PROCESS_ROLES: "broker,controller"
    KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093"
    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
    KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
    KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
    # Replication settings
    KAFKA_DEFAULT_REPLICATION_FACTOR: "3"
    KAFKA_MIN_INSYNC_REPLICAS: "2"          # acks=all requires 2 ISR replicas
    KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "3"
    KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "3"
    KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "2"
    # Log retention
    KAFKA_LOG_RETENTION_HOURS: "168"        # 7 days
    KAFKA_LOG_SEGMENT_BYTES: "1073741824"   # 1 GB per segment
    # Auto topic creation (disable in prod)
    KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
  networks:
    - app-net

services:
  # ─── API Server ───────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=development
      - CONFIG_PATH=configs/app.yaml
    depends_on:
      - pg-primary
      - pg-replica1
      - pg-replica2
      - mongo-primary
      - redis-master
      - kafka-1
      - kafka-2
      - kafka-3
    networks:
      - app-net

  # ─── Background Worker ────────────────────────────────────────
  worker:
    build: .
    command: ["./worker"]
    environment:
      - CONFIG_PATH=configs/app.yaml
    depends_on:
      - pg-primary
      - mongo-primary
      - redis-master
      - kafka-1
    networks:
      - app-net

  # ─── PostgreSQL Shards ────────────────────────────────────────
  pg-primary:
    image: postgres:16
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: orders_shard0
    volumes:
      - pg-primary-data:/var/lib/postgresql/data
      - ./scripts/pg-primary-init.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - "5432:5432"
    networks:
      - app-net

  pg-replica1:
    image: postgres:16
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: orders_shard1
    volumes:
      - pg-replica1-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - app-net

  pg-replica2:
    image: postgres:16
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: orders_shard2
    volumes:
      - pg-replica2-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - app-net

  # ─── MongoDB Replica Set ──────────────────────────────────────
  mongo-primary:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongouser
      MONGO_INITDB_ROOT_PASSWORD: secret
    volumes:
      - mongo-primary-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - app-net

  mongo-secondary1:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongouser
      MONGO_INITDB_ROOT_PASSWORD: secret
    volumes:
      - mongo-secondary1-data:/data/db
    ports:
      - "27018:27017"
    networks:
      - app-net

  mongo-secondary2:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongouser
      MONGO_INITDB_ROOT_PASSWORD: secret
    volumes:
      - mongo-secondary2-data:/data/db
    ports:
      - "27019:27017"
    networks:
      - app-net

  mongo-init:
    image: mongo:7
    depends_on:
      - mongo-primary
      - mongo-secondary1
      - mongo-secondary2
    volumes:
      - ./scripts/mongo-init.js:/mongo-init.js
    command: >
      bash -c "sleep 10 && mongosh --host mongo-primary:27017 -u mongouser -p secret --authenticationDatabase admin /mongo-init.js"
    networks:
      - app-net

  # ─── Redis Master/Replica/Sentinel ───────────────────────────
  redis-master:
    image: redis:7-alpine
    command: redis-server --requirepass secret --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-master-data:/data
    networks:
      - app-net

  redis-replica1:
    image: redis:7-alpine
    command: redis-server --requirepass secret --replicaof redis-master 6379 --masterauth secret
    ports:
      - "6380:6379"
    depends_on:
      - redis-master
    networks:
      - app-net

  redis-replica2:
    image: redis:7-alpine
    command: redis-server --requirepass secret --replicaof redis-master 6379 --masterauth secret
    ports:
      - "6381:6379"
    depends_on:
      - redis-master
    networks:
      - app-net

  redis-sentinel1:
    image: redis:7-alpine
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./configs/sentinel.conf:/etc/redis/sentinel.conf
    depends_on:
      - redis-master
      - redis-replica1
      - redis-replica2
    networks:
      - app-net

  # ─── Redis Cluster (3 masters × 1 replica = 6 nodes) ─────────
  # Cluster mode: sharding (16384 slots) + replication built-in.
  # Each master owns ~5461 slots; each has 1 replica on a different node.
  # Use cluster mode in production; standalone above for dev simplicity.
  redis-cluster-1:
    image: redis:7-alpine
    command: >
      redis-server
      --port 7001
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --requirepass secret
      --masterauth secret
    ports:
      - "7001:7001"
    networks:
      - app-net

  redis-cluster-2:
    image: redis:7-alpine
    command: >
      redis-server
      --port 7002
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --requirepass secret
      --masterauth secret
    ports:
      - "7002:7002"
    networks:
      - app-net

  redis-cluster-3:
    image: redis:7-alpine
    command: >
      redis-server
      --port 7003
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --requirepass secret
      --masterauth secret
    ports:
      - "7003:7003"
    networks:
      - app-net

  redis-cluster-4:
    image: redis:7-alpine
    command: >
      redis-server
      --port 7004
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --requirepass secret
      --masterauth secret
    ports:
      - "7004:7004"
    networks:
      - app-net

  redis-cluster-5:
    image: redis:7-alpine
    command: >
      redis-server
      --port 7005
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --requirepass secret
      --masterauth secret
    ports:
      - "7005:7005"
    networks:
      - app-net

  redis-cluster-6:
    image: redis:7-alpine
    command: >
      redis-server
      --port 7006
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --requirepass secret
      --masterauth secret
    ports:
      - "7006:7006"
    networks:
      - app-net

  # Initialises the cluster topology (runs once, then exits)
  redis-cluster-init:
    image: redis:7-alpine
    depends_on:
      - redis-cluster-1
      - redis-cluster-2
      - redis-cluster-3
      - redis-cluster-4
      - redis-cluster-5
      - redis-cluster-6
    command: >
      sh -c "sleep 5 &&
      redis-cli -a secret --cluster create
        redis-cluster-1:7001
        redis-cluster-2:7002
        redis-cluster-3:7003
        redis-cluster-4:7004
        redis-cluster-5:7005
        redis-cluster-6:7006
      --cluster-replicas 1 --cluster-yes"
    networks:
      - app-net

  # ─── Kafka Broker 1 ───────────────────────────────────────────
  kafka-1:
    <<: *kafka-common
    hostname: kafka-1
    environment:
      <<: *kafka-common
      KAFKA_NODE_ID: "1"
      KAFKA_LISTENERS: "PLAINTEXT://kafka-1:9092,CONTROLLER://kafka-1:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-1:9092"
    volumes:
      - kafka-1-data:/var/lib/kafka/data
    ports:
      - "9092:9092"

  # ─── Kafka Broker 2 ───────────────────────────────────────────
  kafka-2:
    <<: *kafka-common
    hostname: kafka-2
    environment:
      <<: *kafka-common
      KAFKA_NODE_ID: "2"
      KAFKA_LISTENERS: "PLAINTEXT://kafka-2:9092,CONTROLLER://kafka-2:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-2:9092"
    volumes:
      - kafka-2-data:/var/lib/kafka/data
    ports:
      - "9093:9092"

  # ─── Kafka Broker 3 ───────────────────────────────────────────
  kafka-3:
    <<: *kafka-common
    hostname: kafka-3
    environment:
      <<: *kafka-common
      KAFKA_NODE_ID: "3"
      KAFKA_LISTENERS: "PLAINTEXT://kafka-3:9092,CONTROLLER://kafka-3:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-3:9092"
    volumes:
      - kafka-3-data:/var/lib/kafka/data
    ports:
      - "9094:9092"

  # ─── Kafka UI (observability) ─────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka-1:9092,kafka-2:9092,kafka-3:9092"
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  pg-primary-data:
  pg-replica1-data:
  pg-replica2-data:
  mongo-primary-data:
  mongo-secondary1-data:
  mongo-secondary2-data:
  redis-master-data:
  kafka-1-data:
  kafka-2-data:
  kafka-3-data:
